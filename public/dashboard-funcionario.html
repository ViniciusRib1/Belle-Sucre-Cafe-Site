<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Belle Sucré</title>
    <link href="https://fonts.googleapis.com/css2?family=Magra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-color: #4b2c15;
            --header-color: #5d3a1a;
            --bg-content: #c4a484;
            --card-bg: #e3cbb3;
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Magra', sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg-content);
            overflow: hidden;
        }

        /* Menu Lateral */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-color);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar h2 {
            padding: 0 20px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(255,255,255,0.1);
        }

        /* Área Principal */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--header-color);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-area {
            padding: 40px;
            overflow-y: auto;
        }

        .glass-panel {
            background-color: var(--card-bg);
            border-radius: 40px;
            padding: 40px;
            min-height: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: #3e2714;
            margin-bottom: 30px;
        }

        /* Lista de Pedidos Dinâmica */
        .order-card {
            background: rgba(255,255,255,0.5);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-photo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            overflow: visible;
            flex-shrink: 0;
        }

        .user-photo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        /* Efeito de Zoom na foto ao clicar/segurar */
        .user-photo img:active {
            transform: scale(3.5);
            z-index: 1000;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        /* Botões de Ação */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 15px;
        }

        .btn-action {
            border: none;
            border-radius: 5px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-confirm { background-color: #2e7d32; color: white; }
        .btn-delete { background-color: #c62828; color: white; }
        .btn-action:hover { opacity: 0.8; }

        /* Formulário de Cadastro */
        .form-cadastro {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-family: 'Magra', sans-serif;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Admin Dashboard</h2>
        <div class="nav-item" onclick="showSection('pedidos', this)">
            <ion-icon name="cafe-outline"></ion-icon> Belle Sucré Café
        </div>
        <div class="nav-item active" onclick="showSection('pedidos', this)">
            <ion-icon name="receipt-outline"></ion-icon> Pedidos
        </div>
        <div class="nav-item" onclick="showSection('cadastro', this)">
            <ion-icon name="add-circle-outline"></ion-icon> Novo Produto
        </div>
        
        <div class="nav-item logout-item" id="btn-logout" style="margin-top: auto; color: #ffab91; border-top: 1px solid rgba(255,255,255,0.1);">
            <ion-icon name="log-out-outline"></ion-icon> Sair do Sistema
        </div>
    </div>

    <div class="main-container">
        <header>
            <span>Gerenciamento Administrativo</span>
            <span>Olá, Admin</span>
        </header>

        <div class="content-area">
            <div class="glass-panel">
                
                <div id="section-pedidos">
                    <h1 class="section-title">Pedidos Pendentes:</h1>
                    <div id="lista-pedidos">
                        </div>
                </div>

                <div id="section-cadastro" style="display: none;">
                    <h1 class="section-title">Cadastrar Novo Produto:</h1>
                    <form class="form-cadastro" id="form-produto">
                        <input type="text" placeholder="Nome do Doce/Café" required>
                        <input type="number" step="0.01" placeholder="Preço (Ex: 15.50)" required>
                        <input type="file" accept="image/*">
                        <button type="submit" style="background-color: var(--sidebar-color); color: white;">Salvar Produto</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
        // Alternar entre abas
        function showSection(section, element) {
            document.getElementById('section-pedidos').style.display = 'none';
            document.getElementById('section-cadastro').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

            if(section === 'pedidos') {
                document.getElementById('section-pedidos').style.display = 'block';
                carregarPedidos(); 
            } else {
                document.getElementById('section-cadastro').style.display = 'block';
            }
            element.classList.add('active');
        }

        // Carregar dados reais do MySQL
        async function carregarPedidos() {
            const lista = document.getElementById('lista-pedidos');
            
            try {
                const response = await fetch('/api/pedidos');
                const pedidos = await response.json();

                if (!pedidos || pedidos.length === 0) {
                    lista.innerHTML = `
                        <div style="text-align: center; color: #5d3a1a; padding: 60px;">
                            <ion-icon name="cafe-outline" style="font-size: 4rem; opacity: 0.3;"></ion-icon>
                            <p>A fila de pedidos está vazia no momento.</p>
                        </div>`;
                    return;
                }

                lista.innerHTML = ''; 
                pedidos.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'order-card';
                    const dataFormatada = new Date(p.data_pedido).toLocaleDateString('pt-BR', { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                    const statusPago = p.pago ? '✅ Pago' : '❌ Pendente';
                    
                    div.innerHTML = `
                        <div class="user-photo">
                            <img src="/uploads/${p.foto_usuario || 'default.png'}" alt="User">
                        </div>
                        <div style="flex-grow: 1;">
                            <strong style="color: #4b2c15;">Cliente:</strong> ${p.nome_usuario}<br>
                            <strong style="color: #4b2c15;">Itens:</strong> ${p.produtos}<br>
                            <span style="color: #2e7d32; font-weight: bold; font-size: 1.1rem;">Total: R$ ${parseFloat(p.total).toFixed(2)}</span><br>
                            <span style="color: #d9534f;">${statusPago}</span>
                        </div>
                        <div style="text-align: right; font-size: 0.85rem; color: #3e2714; border-left: 1px solid rgba(0,0,0,0.1); padding-left: 15px;">
                            <strong>Pedido #${p.id}</strong><br>
                            <ion-icon name="map-outline"></ion-icon> ${p.endereco_entrega}<br>
                            <ion-icon name="mail-outline"></ion-icon> ${p.email_usuario}<br>
                            <small>${dataFormatada}</small>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-action btn-confirm" onclick="removerPedido(${p.id})">
                                <ion-icon name="checkmark-outline"></ion-icon> Confirmar
                            </button>
                            <button class="btn-action btn-delete" onclick="removerPedido(${p.id})">
                                <ion-icon name="trash-outline"></ion-icon> Excluir
                            </button>
                        </div>
                    `;
                    lista.appendChild(div);
                });
            } catch (err) {
                lista.innerHTML = "<p style='text-align:center;'>Erro ao conectar com o banco de dados MySQL.</p>";
            }
        }

        // Função para deletar o pedido do banco
        async function removerPedido(id) {
            if(confirm("Deseja dar baixa neste pedido?")) {
                await fetch(`/api/pedidos/${id}`, { method: 'DELETE' });
                carregarPedidos(); // Atualiza a lista
            }
        }

        // Logout funcional
        document.getElementById('btn-logout').addEventListener('click', async () => {
            if (confirm("Deseja sair do sistema?")) {
                await fetch('/api/logout-funcionario', { method: 'POST' });
                window.location.href = 'login.html';
            }
        });

        // Inicia carregando os pedidos
        window.onload = carregarPedidos;
    </script>
</body>
</html>
